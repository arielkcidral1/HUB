<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | HUB RH</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="login-screen" id="login-screen">
      <form class="login-card" id="login-form">
        <div class="brand login-brand">
          <div class="brand-mark">
            <svg width="22" height="22" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="54" y="60" width="20" height="80" rx="5" fill="#FFFFFF"/>
              <rect x="126" y="60" width="20" height="80" rx="5" fill="#FFFFFF"/>
              <rect x="54" y="90" width="92" height="20" rx="5" fill="#F0B429"/>
            </svg>
          </div>
          <div>
            <strong>HUB</strong>
            <span>Acesso do RH</span>
          </div>
        </div>
        <label>Nome
          <input name="nome" autocomplete="username" required />
        </label>
        <label>Senha
          <input name="senha" type="password" autocomplete="current-password" required />
        </label>
        <p class="login-error" id="login-error" role="alert"></p>
        <button class="primary-button" type="submit">Entrar</button>
      </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
