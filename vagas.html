<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portal de Vagas | HUB RH</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="public-layout">
      <div class="public-container public-container-wide">
        <header class="public-header">
          <p class="eyebrow">Trabalhe conosco</p>
          <h1>Vagas Abertas</h1>
          <p class="public-header-text">Veja as oportunidades disponiveis e escolha a vaga para enviar seu curriculo.</p>
        </header>

        <div class="panel">
          <div class="panel-header">
            <h2>Oportunidades disponiveis</h2>
          </div>
          <div class="public-job-grid" id="public-vagas-list">
            <p class="empty-state">Carregando vagas...</p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
