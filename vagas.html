<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portal de Vagas | HUB RH</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="public-layout" data-public-vagas="true">
      <div class="public-container public-container-wide">
        <div class="public-brand">
          <img class="public-brand-logo" src="assets/logo.svg" alt="HUB RH" />
          <strong>HUB</strong>
        </div>

        <header class="public-header">
          <p class="eyebrow">Trabalhe conosco</p>
          <h1>Vagas Abertas</h1>
          <p class="public-header-text">Veja as oportunidades disponiveis e escolha a vaga para enviar seu curriculo.</p>
        </header>

        <div class="panel">
          <div class="panel-header">
            <h2>Oportunidades disponiveis</h2>
          </div>
          <div class="public-job-grid" id="public-vagas-list">
            <p class="empty-state">Carregando vagas...</p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
