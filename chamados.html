<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chamados de EPI | HUB RH</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="public-layout" data-public-chamados="true">
      <div class="public-container">
        <header class="public-header">
          <p class="eyebrow">Solicitacao de EPI</p>
          <h1>Abrir chamado</h1>
          <p class="public-header-text">Informe a unidade, os EPIs necessarios e os dados para acompanhamento.</p>
        </header>

        <form class="panel" id="chamado-form" data-public-chamados="true">
          <div class="panel-header">
            <h2>Dados do chamado</h2>
          </div>
          <label>Solicitante
            <input name="solicitante" placeholder="Seu nome" required />
          </label>
          <label>Telefone
            <input name="telefone" id="telefone-input" placeholder="(00) 00000-0000" maxlength="15" inputmode="numeric" required />
          </label>
          <label>Unidade / Loja
            <select name="unidade" data-unit-select required></select>
          </label>
          <label>Setor
            <input name="setor" placeholder="Ex: Producao, oficina, administrativo" required />
          </label>
          <label>EPIs solicitados
            <textarea name="epis" rows="4" placeholder="Ex: Luvas nitrilicas - 10 unidades; Oculos de protecao - 2 unidades" required></textarea>
          </label>
          <label>Observacoes
            <textarea name="observacoes" rows="3" placeholder="Urgencia, tamanho, CA, motivo da troca..."></textarea>
          </label>
          <button class="primary-button" type="submit">Abrir chamado</button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
