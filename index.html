<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HUB | RH</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="login-screen" id="login-screen">
      <form class="login-card" id="login-form">
        <div class="brand login-brand">
          <div class="brand-mark">H</div>
          <div>
            <strong>HUB</strong>
            <span>Acesso do RH</span>
          </div>
        </div>
        <label>Nome
          <input name="nome" autocomplete="username" required />
        </label>
        <label>Senha
          <input name="senha" type="password" autocomplete="current-password" required />
        </label>
        <p class="login-error" id="login-error" role="alert"></p>
        <button class="primary-button" type="submit">Entrar</button>
      </form>
    </section>

    <div class="app-shell is-locked" id="app-shell">
      <aside class="sidebar" aria-label="Navegacao principal">
        <div class="brand">
          <div class="brand-mark">H</div>
          <div>
            <strong>HUB</strong>
            <span>Equipe de RH</span>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" data-view="denuncias" type="button">Denuncias recebidas</button>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Canal de denuncias</p>
            <h1>Denuncias recebidas</h1>
          </div>
          <div class="user-chip">
            <span class="status-dot"></span>
            <span id="sync-status">Conectando Supabase</span>
          </div>
          <button class="logout-button" id="logout-button" type="button">Sair</button>
        </header>

        <section class="hero-panel" aria-label="Resumo do canal de denuncias">
          <img src="assets/hub-operations.png" alt="Mesa organizada com documentos de RH, envelope confidencial, EPIs e cartoes de vagas" />
          <div class="hero-copy">
            <p>Visualizacao restrita das denuncias anonimas enviadas pelo canal publico.</p>
          </div>
        </section>

        <section class="view active" id="denuncias">
          <div class="metric-grid">
            <article class="metric-card">
              <span>Denuncias abertas</span>
              <strong id="metric-denuncias">0</strong>
            </article>
          </div>

          <div class="single-workspace">
            <div class="panel">
              <div class="panel-header split-header">
                <div>
                  <h2>Denuncias anonimas recebidas</h2>
                  <p class="item-meta">Este painel e somente para visualizacao do RH</p>
                </div>
                <a class="secondary-link" href="denuncia.html" target="_blank" rel="noreferrer">Abrir canal publico</a>
              </div>
              <div class="card-list denuncia-list" id="denuncias-list"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
