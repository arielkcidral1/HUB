<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C6259"/>
      <stop offset="55%" stop-color="#0F8275"/>
      <stop offset="100%" stop-color="#F0B429"/>
    </linearGradient>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#094D46"/>
      <stop offset="100%" stop-color="#0B1A18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0C6259" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fundo: hexágono levemente arredondado — solidez corporativa -->
  <rect x="12" y="12" width="176" height="176" rx="38" fill="url(#grad-bg)" filter="url(#shadow)"/>

  <!-- Faixa de acento no topo — assinatura visual -->
  <rect x="12" y="12" width="176" height="5" rx="3" fill="url(#grad-main)" opacity="0.9"/>

  <!-- Letra H — construída geometricamente com linhas de peso preciso -->
  <!-- Coluna esquerda do H -->
  <rect x="54" y="60" width="20" height="80" rx="5" fill="#FFFFFF"/>
  <!-- Coluna direita do H -->
  <rect x="126" y="60" width="20" height="80" rx="5" fill="#FFFFFF"/>
  <!-- Barra central do H — em dourado para criar contraste e personalidade -->
  <rect x="54" y="90" width="92" height="20" rx="5" fill="url(#grad-main)"/>

  <!-- Detalhe: ponto dourado no canto inferior direito — marca de qualidade -->
  <circle cx="158" cy="158" r="7" fill="#F0B429" opacity="0.75"/>
</svg>
