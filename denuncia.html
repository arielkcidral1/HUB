<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fazer Denúncia | HUB RH</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="public-layout">
      <div class="public-container">
        <header class="public-header">
          <p class="eyebrow">Canal Seguro e Confidencial</p>
          <h1>Canal de Denúncias</h1>
        </header>

        <form class="panel" id="denuncia-form">
          <div class="panel-header">
            <h2>Registrar nova denúncia</h2>
          </div>
          <p class="public-description">Use este canal para relatar de forma segura qualquer conduta inadequada, assédio, ou violação de políticas da empresa. A denúncia é totalmente anônima.</p>
          <label>Descrição do ocorrido
            <textarea name="descricao" rows="6" placeholder="Nos conte detalhadamente o que aconteceu" required></textarea>
          </label>
          <button class="primary-button" type="submit">Enviar denúncia confidencial</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
