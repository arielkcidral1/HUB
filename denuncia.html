<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Denuncia Anonima | HUB RH</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="public-layout">
      <div class="public-container">
        <header class="public-header">
          <p class="eyebrow">Canal seguro e confidencial</p>
          <h1>Denuncia anonima</h1>
        </header>

        <form class="panel" id="denuncia-form" data-public-denuncia="true">
          <div class="panel-header">
            <h2>Enviar mensagem</h2>
          </div>
          <p class="public-description">Este canal nao solicita nome, documento, telefone ou e-mail. Envie somente a mensagem da denuncia.</p>
          <label>Mensagem da denuncia
            <textarea name="mensagem" rows="7" placeholder="Descreva a situacao de forma objetiva" required></textarea>
          </label>
          <p class="form-feedback" id="denuncia-feedback" role="status"></p>
          <button class="primary-button" type="submit">Enviar denuncia anonima</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
